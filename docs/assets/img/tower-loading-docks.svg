<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1376 768" width="1376" height="768">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
    <linearGradient id="dockBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0C1018"/>
      <stop offset="60%" stop-color="#0A0E14"/>
      <stop offset="100%" stop-color="#12171F"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
    </radialGradient>
    <!-- Overhead light glow -->
    <radialGradient id="overheadLight" cx="0.5" cy="0.1" r="0.45">
      <stop offset="0%" stop-color="#E8A031" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#E8A031" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#E8A031" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D1A0A"/>
      <stop offset="100%" stop-color="#2A1208"/>
    </linearGradient>
    <linearGradient id="container1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A1508"/>
      <stop offset="100%" stop-color="#1A0E06"/>
    </linearGradient>
    <linearGradient id="container2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D2A2A"/>
      <stop offset="100%" stop-color="#081A1A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1376" height="768" fill="url(#dockBg)"/>

  <!-- Loading dock floor — concrete -->
  <rect x="0" y="520" width="1376" height="248" fill="#10141C"/>
  <line x1="0" y1="520" x2="1376" y2="520" stroke="#1A1F2B" stroke-width="2"/>

  <!-- Concrete cracks -->
  <path d="M200,520 L230,600 L210,700" stroke="#1A1F2B" stroke-width="1" fill="none"/>
  <path d="M600,520 L620,580 L590,650 L610,768" stroke="#1A1F2B" stroke-width="1" fill="none"/>
  <path d="M900,520 L880,600 L910,700" stroke="#1A1F2B" stroke-width="1" fill="none"/>

  <!-- Dock bay doors (3 large bays) -->
  <!-- Bay 1 -->
  <rect x="50" y="180" width="320" height="340" fill="#080C12" stroke="#2A2A2A" stroke-width="2"/>
  <line x1="50" y1="250" x2="370" y2="250" stroke="#1A1F2B" stroke-width="1"/>
  <line x1="50" y1="320" x2="370" y2="320" stroke="#1A1F2B" stroke-width="1"/>
  <line x1="50" y1="390" x2="370" y2="390" stroke="#1A1F2B" stroke-width="1"/>
  <line x1="50" y1="460" x2="370" y2="460" stroke="#1A1F2B" stroke-width="1"/>

  <!-- Bay 2 (partially open) -->
  <rect x="440" y="180" width="320" height="340" fill="#060A10" stroke="#2A2A2A" stroke-width="2"/>
  <rect x="440" y="180" width="320" height="80" fill="url(#rust)" stroke="#2A2A2A" stroke-width="1"/>
  <!-- Darkness behind open bay -->
  <rect x="442" y="262" width="316" height="256" fill="#030508"/>

  <!-- Bay 3 -->
  <rect x="830" y="180" width="320" height="340" fill="#080C12" stroke="#2A2A2A" stroke-width="2"/>
  <line x1="830" y1="250" x2="1150" y2="250" stroke="#1A1F2B" stroke-width="1"/>
  <line x1="830" y1="320" x2="1150" y2="320" stroke="#1A1F2B" stroke-width="1"/>
  <line x1="830" y1="390" x2="1150" y2="390" stroke="#1A1F2B" stroke-width="1"/>
  <line x1="830" y1="460" x2="1150" y2="460" stroke="#1A1F2B" stroke-width="1"/>

  <!-- Ceiling structure -->
  <rect x="0" y="0" width="1376" height="180" fill="#0A0E14"/>
  <rect x="0" y="170" width="1376" height="10" fill="#151B24"/>

  <!-- Steel I-beams on ceiling -->
  <rect x="370" y="0" width="8" height="180" fill="#1A1F2B"/>
  <rect x="760" y="0" width="8" height="180" fill="#1A1F2B"/>
  <rect x="1150" y="0" width="8" height="180" fill="#1A1F2B"/>

  <!-- Cargo containers -->
  <!-- Container left (rusted red) -->
  <rect x="80" y="440" width="200" height="80" fill="url(#container1)" stroke="#3D1A0A" stroke-width="2" rx="2"/>
  <line x1="130" y1="440" x2="130" y2="520" stroke="#3D1A0A" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="440" x2="180" y2="520" stroke="#3D1A0A" stroke-width="1" opacity="0.5"/>
  <line x1="230" y1="440" x2="230" y2="520" stroke="#3D1A0A" stroke-width="1" opacity="0.5"/>

  <!-- Container center (dark teal) -->
  <rect x="500" y="420" width="240" height="100" fill="url(#container2)" stroke="#2A6B77" stroke-width="2" rx="2"/>
  <line x1="560" y1="420" x2="560" y2="520" stroke="#2A6B77" stroke-width="1" opacity="0.5"/>
  <line x1="620" y1="420" x2="620" y2="520" stroke="#2A6B77" stroke-width="1" opacity="0.5"/>
  <line x1="680" y1="420" x2="680" y2="520" stroke="#2A6B77" stroke-width="1" opacity="0.5"/>

  <!-- Container right (stacked) -->
  <rect x="900" y="380" width="220" height="70" fill="url(#container1)" stroke="#3D1A0A" stroke-width="2" rx="2"/>
  <rect x="920" y="450" width="200" height="70" fill="#0D1A18" stroke="#2A6B77" stroke-width="2" rx="2"/>

  <!-- Far right container -->
  <rect x="1200" y="400" width="160" height="120" fill="url(#container1)" stroke="#3D1A0A" stroke-width="2" rx="2"/>

  <!-- Overhead light (single working light) -->
  <rect x="594" y="170" width="12" height="20" fill="#2A2A2A"/>
  <ellipse cx="600" cy="195" rx="15" ry="5" fill="#E8A031" opacity="0.4"/>
  <rect width="1376" height="768" fill="url(#overheadLight)"/>

  <!-- Pack runner silhouettes between containers -->
  <!-- Runner 1 - crouching between left and center containers -->
  <g opacity="0.3">
    <ellipse cx="400" cy="488" rx="10" ry="6" fill="#060A10"/>
    <rect x="392" y="460" width="16" height="30" rx="4" fill="#060A10"/>
    <rect x="388" y="480" width="10" height="25" rx="2" fill="#060A10" transform="rotate(-15 393 480)"/>
    <rect x="400" y="482" width="10" height="28" rx="2" fill="#060A10" transform="rotate(10 405 482)"/>
    <circle cx="396" cy="462" r="1.5" fill="#E8A031" opacity="0.5"/>
    <circle cx="402" cy="462" r="1.5" fill="#E8A031" opacity="0.5"/>
  </g>

  <!-- Runner 2 - between center and right -->
  <g opacity="0.2">
    <ellipse cx="820" cy="495" rx="8" ry="5" fill="#060A10"/>
    <rect x="813" y="470" width="14" height="28" rx="3" fill="#060A10"/>
    <circle cx="817" cy="472" r="1.5" fill="#E8A031" opacity="0.4"/>
    <circle cx="823" cy="472" r="1.5" fill="#E8A031" opacity="0.4"/>
  </g>

  <!-- Runner 3 - far right shadow -->
  <g opacity="0.15">
    <ellipse cx="1170" cy="500" rx="9" ry="5" fill="#060A10"/>
    <rect x="1163" y="475" width="14" height="30" rx="3" fill="#060A10"/>
    <circle cx="1167" cy="477" r="1.5" fill="#E8A031" opacity="0.3"/>
    <circle cx="1173" cy="477" r="1.5" fill="#E8A031" opacity="0.3"/>
  </g>

  <!-- Scattered debris on floor -->
  <rect x="320" y="560" width="40" height="8" fill="#1A1F2B" transform="rotate(12 340 564)" rx="1"/>
  <rect x="750" y="580" width="30" height="6" fill="#1A1F2B" transform="rotate(-8 765 583)" rx="1"/>
  <rect x="1050" y="550" width="25" height="5" fill="#1A1F2B" transform="rotate(20 1062 552)" rx="1"/>
  <circle cx="450" cy="570" r="6" fill="#151B24"/>
  <circle cx="680" cy="600" r="4" fill="#151B24"/>

  <!-- Vignette -->
  <rect width="1376" height="768" fill="url(#vignette)"/>

  <!-- Noise -->
  <rect width="1376" height="768" filter="url(#noise)" opacity="0.5"/>
</svg>