<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1376 768" width="1376" height="768">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>
    <linearGradient id="farmBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060A10"/>
      <stop offset="100%" stop-color="#0A0E14"/>
    </linearGradient>
    <!-- Blue LED ambient -->
    <radialGradient id="ledAmbient" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#1A3A5C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0A0E14" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1376" height="768" fill="url(#farmBg)"/>

  <!-- Floor -->
  <rect x="0" y="640" width="1376" height="128" fill="#0C1018"/>
  <!-- Raised floor tiles (data center floor) -->
  <g stroke="#151B24" stroke-width="1" fill="none">
    <rect x="0" y="640" width="80" height="80"/>
    <rect x="80" y="640" width="80" height="80"/>
    <rect x="160" y="640" width="80" height="80"/>
    <rect x="240" y="640" width="80" height="80"/>
    <rect x="320" y="640" width="80" height="80"/>
    <rect x="400" y="640" width="80" height="80"/>
    <rect x="480" y="640" width="80" height="80"/>
    <rect x="560" y="640" width="80" height="80"/>
    <rect x="640" y="640" width="80" height="80"/>
    <rect x="720" y="640" width="80" height="80"/>
    <rect x="800" y="640" width="80" height="80"/>
    <rect x="880" y="640" width="80" height="80"/>
    <rect x="960" y="640" width="80" height="80"/>
    <rect x="1040" y="640" width="80" height="80"/>
    <rect x="1120" y="640" width="80" height="80"/>
    <rect x="1200" y="640" width="80" height="80"/>
    <rect x="1280" y="640" width="80" height="80"/>
  </g>

  <!-- Perspective aisle — vanishing point center -->
  <!-- Left row of racks -->
  <g>
    <!-- Rack L1 (closest) -->
    <rect x="80" y="120" width="120" height="520" fill="#0D1118" stroke="#1A1F2B" stroke-width="2" rx="2"/>
    <!-- LED strips -->
    <g fill="#5CCFE6">
      <rect x="100" y="140" width="2" height="500" opacity="0.15"/>
      <rect x="185" y="140" width="2" height="500" opacity="0.1"/>
    </g>
    <!-- Individual LEDs -->
    <g fill="#5CCFE6">
      <rect x="108" y="160" width="3" height="2" opacity="0.9"/>
      <rect x="108" y="190" width="3" height="2" opacity="0.4"/>
      <rect x="108" y="220" width="3" height="2" opacity="0.8"/>
      <rect x="108" y="250" width="3" height="2" opacity="0.3"/>
      <rect x="108" y="280" width="3" height="2" opacity="0.7"/>
      <rect x="108" y="310" width="3" height="2" opacity="0.5"/>
      <rect x="108" y="340" width="3" height="2" opacity="0.9"/>
      <rect x="108" y="370" width="3" height="2" opacity="0.6"/>
      <rect x="108" y="400" width="3" height="2" opacity="0.4"/>
      <rect x="108" y="430" width="3" height="2" opacity="0.8"/>
      <rect x="108" y="460" width="3" height="2" opacity="0.3"/>
      <rect x="108" y="490" width="3" height="2" opacity="0.7"/>
      <rect x="108" y="520" width="3" height="2" opacity="0.5"/>
      <rect x="108" y="550" width="3" height="2" opacity="0.9"/>
      <rect x="108" y="580" width="3" height="2" opacity="0.6"/>
      <rect x="108" y="610" width="3" height="2" opacity="0.4"/>
    </g>

    <!-- Rack L2 -->
    <rect x="240" y="120" width="120" height="520" fill="#0D1118" stroke="#1A1F2B" stroke-width="2" rx="2"/>
    <g fill="#5CCFE6">
      <rect x="260" y="140" width="2" height="500" opacity="0.12"/>
      <rect x="268" y="165" width="3" height="2" opacity="0.7"/>
      <rect x="268" y="205" width="3" height="2" opacity="0.5"/>
      <rect x="268" y="245" width="3" height="2" opacity="0.9"/>
      <rect x="268" y="285" width="3" height="2" opacity="0.3"/>
      <rect x="268" y="325" width="3" height="2" opacity="0.8"/>
      <rect x="268" y="365" width="3" height="2" opacity="0.6"/>
      <rect x="268" y="405" width="3" height="2" opacity="0.4"/>
      <rect x="268" y="445" width="3" height="2" opacity="0.9"/>
      <rect x="268" y="485" width="3" height="2" opacity="0.5"/>
      <rect x="268" y="525" width="3" height="2" opacity="0.7"/>
      <rect x="268" y="565" width="3" height="2" opacity="0.3"/>
      <rect x="268" y="605" width="3" height="2" opacity="0.8"/>
    </g>

    <!-- Rack L3 -->
    <rect x="400" y="140" width="110" height="500" fill="#0D1118" stroke="#1A1F2B" stroke-width="1.5" rx="2"/>
    <g fill="#5CCFE6">
      <rect x="420" y="160" width="2" height="470" opacity="0.1"/>
      <rect x="425" y="180" width="3" height="2" opacity="0.6"/>
      <rect x="425" y="230" width="3" height="2" opacity="0.8"/>
      <rect x="425" y="280" width="3" height="2" opacity="0.4"/>
      <rect x="425" y="330" width="3" height="2" opacity="0.9"/>
      <rect x="425" y="380" width="3" height="2" opacity="0.5"/>
      <rect x="425" y="430" width="3" height="2" opacity="0.7"/>
      <rect x="425" y="480" width="3" height="2" opacity="0.3"/>
      <rect x="425" y="530" width="3" height="2" opacity="0.8"/>
      <rect x="425" y="580" width="3" height="2" opacity="0.6"/>
    </g>
  </g>

  <!-- Right row of racks (mirror) -->
  <g>
    <rect x="1176" y="120" width="120" height="520" fill="#0D1118" stroke="#1A1F2B" stroke-width="2" rx="2"/>
    <g fill="#5CCFE6">
      <rect x="1274" y="140" width="2" height="500" opacity="0.15"/>
      <rect x="1266" y="155" width="3" height="2" opacity="0.8"/>
      <rect x="1266" y="195" width="3" height="2" opacity="0.5"/>
      <rect x="1266" y="235" width="3" height="2" opacity="0.9"/>
      <rect x="1266" y="275" width="3" height="2" opacity="0.4"/>
      <rect x="1266" y="315" width="3" height="2" opacity="0.7"/>
      <rect x="1266" y="355" width="3" height="2" opacity="0.6"/>
      <rect x="1266" y="395" width="3" height="2" opacity="0.3"/>
      <rect x="1266" y="435" width="3" height="2" opacity="0.8"/>
      <rect x="1266" y="475" width="3" height="2" opacity="0.5"/>
      <rect x="1266" y="515" width="3" height="2" opacity="0.9"/>
      <rect x="1266" y="555" width="3" height="2" opacity="0.4"/>
      <rect x="1266" y="595" width="3" height="2" opacity="0.7"/>
    </g>

    <rect x="1016" y="120" width="120" height="520" fill="#0D1118" stroke="#1A1F2B" stroke-width="2" rx="2"/>
    <g fill="#5CCFE6">
      <rect x="1114" y="140" width="2" height="500" opacity="0.12"/>
      <rect x="1106" y="170" width="3" height="2" opacity="0.6"/>
      <rect x="1106" y="210" width="3" height="2" opacity="0.9"/>
      <rect x="1106" y="250" width="3" height="2" opacity="0.4"/>
      <rect x="1106" y="290" width="3" height="2" opacity="0.7"/>
      <rect x="1106" y="330" width="3" height="2" opacity="0.5"/>
      <rect x="1106" y="370" width="3" height="2" opacity="0.8"/>
      <rect x="1106" y="410" width="3" height="2" opacity="0.3"/>
      <rect x="1106" y="450" width="3" height="2" opacity="0.9"/>
      <rect x="1106" y="490" width="3" height="2" opacity="0.6"/>
      <rect x="1106" y="530" width="3" height="2" opacity="0.4"/>
      <rect x="1106" y="570" width="3" height="2" opacity="0.7"/>
    </g>

    <rect x="866" y="140" width="110" height="500" fill="#0D1118" stroke="#1A1F2B" stroke-width="1.5" rx="2"/>
    <g fill="#5CCFE6">
      <rect x="954" y="160" width="2" height="470" opacity="0.1"/>
      <rect x="948" y="185" width="3" height="2" opacity="0.7"/>
      <rect x="948" y="235" width="3" height="2" opacity="0.5"/>
      <rect x="948" y="285" width="3" height="2" opacity="0.9"/>
      <rect x="948" y="335" width="3" height="2" opacity="0.4"/>
      <rect x="948" y="385" width="3" height="2" opacity="0.8"/>
      <rect x="948" y="435" width="3" height="2" opacity="0.6"/>
      <rect x="948" y="485" width="3" height="2" opacity="0.3"/>
      <rect x="948" y="535" width="3" height="2" opacity="0.7"/>
    </g>
  </g>

  <!-- Stalker eyes reflecting between racks — in the central aisle -->
  <!-- Pair 1 — close, ground level -->
  <g opacity="0.5">
    <circle cx="660" cy="560" r="3" fill="#E8A031" opacity="0.6"/>
    <circle cx="674" cy="558" r="3" fill="#E8A031" opacity="0.6"/>
  </g>
  <!-- Pair 2 — mid distance -->
  <g opacity="0.35">
    <circle cx="700" cy="440" r="2.5" fill="#E8A031" opacity="0.5"/>
    <circle cx="712" cy="438" r="2.5" fill="#E8A031" opacity="0.5"/>
  </g>
  <!-- Pair 3 — far -->
  <g opacity="0.2">
    <circle cx="688" cy="340" r="2" fill="#E8A031" opacity="0.4"/>
    <circle cx="696" cy="339" r="2" fill="#E8A031" opacity="0.4"/>
  </g>
  <!-- Pair 4 — between left racks -->
  <g opacity="0.3">
    <circle cx="225" cy="480" r="2" fill="#E8A031" opacity="0.5"/>
    <circle cx="233" cy="478" r="2" fill="#E8A031" opacity="0.5"/>
  </g>

  <!-- Blue ambient light -->
  <rect width="1376" height="768" fill="url(#ledAmbient)"/>

  <!-- Ceiling structure -->
  <rect x="0" y="0" width="1376" height="100" fill="#080B10"/>
  <rect x="0" y="95" width="1376" height="8" fill="#12171F"/>
  <!-- Cable trays -->
  <rect x="80" y="100" width="420" height="6" fill="#151B24"/>
  <rect x="876" y="100" width="420" height="6" fill="#151B24"/>

  <!-- Vignette -->
  <rect width="1376" height="768" fill="url(#vignette)"/>

  <!-- Noise -->
  <rect width="1376" height="768" filter="url(#noise)" opacity="0.5"/>
</svg>