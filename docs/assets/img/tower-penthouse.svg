<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1376 768" width="1376" height="768">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
    </radialGradient>
    <!-- Night sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060810"/>
      <stop offset="60%" stop-color="#0A1020"/>
      <stop offset="100%" stop-color="#101830"/>
    </linearGradient>
    <!-- Window glass reflection -->
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5CCFE6" stop-opacity="0.02"/>
      <stop offset="50%" stop-color="#5CCFE6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#5CCFE6" stop-opacity="0.01"/>
    </linearGradient>
    <!-- Wind streaks -->
    <linearGradient id="windStreak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C5CDD8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C5CDD8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C5CDD8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Sky through windows -->
  <rect width="1376" height="768" fill="url(#sky)"/>

  <!-- Distant skyline silhouette -->
  <g fill="#0C1220" opacity="0.8">
    <!-- Building silhouettes -->
    <rect x="100" y="280" width="60" height="300"/>
    <rect x="170" y="320" width="40" height="260"/>
    <rect x="220" y="250" width="50" height="330"/>
    <rect x="290" y="300" width="35" height="280"/>
    <rect x="340" y="200" width="45" height="380"/>
    <rect x="400" y="340" width="55" height="240"/>
    <rect x="470" y="280" width="40" height="300"/>
    <rect x="800" y="310" width="50" height="270"/>
    <rect x="860" y="240" width="40" height="340"/>
    <rect x="910" y="290" width="60" height="290"/>
    <rect x="990" y="330" width="35" height="250"/>
    <rect x="1040" y="260" width="45" height="320"/>
    <rect x="1100" y="300" width="55" height="280"/>
    <rect x="1170" y="350" width="40" height="230"/>
    <rect x="1220" y="280" width="50" height="300"/>
  </g>

  <!-- Tiny building lights -->
  <g fill="#E8A031" opacity="0.3">
    <rect x="115" y="310" width="3" height="3"/>
    <rect x="130" y="340" width="3" height="3"/>
    <rect x="235" y="290" width="3" height="3"/>
    <rect x="245" y="320" width="3" height="3"/>
    <rect x="355" y="240" width="3" height="3"/>
    <rect x="350" y="280" width="3" height="3"/>
    <rect x="870" y="270" width="3" height="3"/>
    <rect x="925" y="320" width="3" height="3"/>
    <rect x="1055" y="290" width="3" height="3"/>
    <rect x="1115" y="340" width="3" height="3"/>
    <rect x="1235" y="310" width="3" height="3"/>
  </g>

  <!-- Bioluminescent patches at street level -->
  <g opacity="0.15">
    <ellipse cx="300" cy="580" rx="60" ry="8" fill="#5CCFE6"/>
    <ellipse cx="600" cy="570" rx="40" ry="6" fill="#5CCFE6"/>
    <ellipse cx="950" cy="575" rx="50" ry="7" fill="#5CCFE6"/>
  </g>

  <!-- Floor-to-ceiling window frames -->
  <!-- The room interior frame -->
  <rect x="0" y="0" width="1376" height="768" fill="none"/>

  <!-- Window mullions (vertical) -->
  <rect x="0" y="0" width="40" height="768" fill="#0A0E14"/>
  <rect x="270" y="0" width="12" height="768" fill="#12171F"/>
  <rect x="540" y="0" width="12" height="768" fill="#12171F"/>
  <rect x="682" y="0" width="12" height="768" fill="#12171F"/>
  <rect x="824" y="0" width="12" height="768" fill="#12171F"/>
  <rect x="1094" y="0" width="12" height="768" fill="#12171F"/>
  <rect x="1336" y="0" width="40" height="768" fill="#0A0E14"/>

  <!-- Window mullions (horizontal) -->
  <rect x="0" y="0" width="1376" height="30" fill="#0A0E14"/>
  <rect x="0" y="580" width="1376" height="188" fill="#0A0E14"/>

  <!-- Half-wall below windows -->
  <rect x="0" y="580" width="1376" height="20" fill="#1A1F2B"/>

  <!-- Glass reflections -->
  <rect x="42" y="32" width="226" height="546" fill="url(#glass)"/>
  <rect x="284" y="32" width="254" height="546" fill="url(#glass)"/>
  <rect x="554" y="32" width="126" height="546" fill="url(#glass)"/>

  <!-- Broken window panes — glass shards -->
  <!-- Shattered pane in center-right -->
  <g opacity="0.6">
    <polygon points="836,32 836,200 920,32" fill="none" stroke="#5CCFE6" stroke-width="1" opacity="0.2"/>
    <polygon points="836,200 900,320 836,400" fill="none" stroke="#5CCFE6" stroke-width="1" opacity="0.15"/>
    <line x1="836" y1="200" x2="940" y2="180" stroke="#5CCFE6" stroke-width="1" opacity="0.1"/>
    <!-- Missing glass — open to sky -->
    <polygon points="840,200 1090,32 1090,350 840,400" fill="url(#sky)" opacity="0.3"/>
  </g>

  <!-- Wind streaks through broken window -->
  <g opacity="0.6">
    <rect x="700" y="180" width="300" height="2" fill="url(#windStreak)" transform="rotate(-3 850 181)"/>
    <rect x="650" y="250" width="400" height="1.5" fill="url(#windStreak)" transform="rotate(-2 850 250)"/>
    <rect x="720" y="320" width="350" height="2" fill="url(#windStreak)" transform="rotate(-4 895 321)"/>
    <rect x="680" y="140" width="280" height="1.5" fill="url(#windStreak)" transform="rotate(-1 820 140)"/>
    <rect x="750" y="400" width="250" height="1" fill="url(#windStreak)" transform="rotate(-2 875 400)"/>
  </g>

  <!-- Executive floor interior elements -->
  <!-- Overturned desk -->
  <rect x="100" y="630" width="180" height="15" fill="#1A1F2B" transform="rotate(-8 190 637)" rx="2"/>
  <rect x="130" y="645" width="8" height="40" fill="#1A1F2B" transform="rotate(-8 134 665)"/>
  <rect x="260" y="645" width="8" height="40" fill="#1A1F2B" transform="rotate(-8 264 665)"/>

  <!-- Scattered papers on floor -->
  <rect x="350" y="670" width="20" height="14" fill="#1A1F2B" transform="rotate(25 360 677)" rx="1" opacity="0.5"/>
  <rect x="380" y="680" width="18" height="12" fill="#1A1F2B" transform="rotate(-15 389 686)" rx="1" opacity="0.4"/>
  <rect x="320" y="690" width="16" height="11" fill="#1A1F2B" transform="rotate(40 328 695)" rx="1" opacity="0.3"/>

  <!-- Fallen chair -->
  <g transform="translate(700, 640) rotate(70)">
    <rect x="0" y="0" width="40" height="5" fill="#1A1F2B" rx="1"/>
    <rect x="0" y="0" width="5" height="30" fill="#1A1F2B" rx="1"/>
    <rect x="35" y="0" width="5" height="30" fill="#1A1F2B" rx="1"/>
  </g>

  <!-- Floor -->
  <rect x="0" y="600" width="1376" height="168" fill="#0C1018" opacity="0.6"/>

  <!-- Exposed roof edge on right — structural damage -->
  <g opacity="0.7">
    <polygon points="1200,0 1376,0 1376,60 1250,30" fill="#12171F"/>
    <line x1="1200" y1="0" x2="1250" y2="30" stroke="#2A2A2A" stroke-width="2"/>
    <line x1="1220" y1="0" x2="1300" y2="45" stroke="#2A2A2A" stroke-width="1"/>
    <!-- Rebar -->
    <line x1="1280" y1="10" x2="1320" y2="50" stroke="#8B3A1A" stroke-width="2"/>
    <line x1="1300" y1="5" x2="1340" y2="40" stroke="#8B3A1A" stroke-width="2"/>
  </g>

  <!-- Vignette -->
  <rect width="1376" height="768" fill="url(#vignette)"/>

  <!-- Noise -->
  <rect width="1376" height="768" filter="url(#noise)" opacity="0.5"/>
</svg>