name: Assign Copilot to issue

on:
  issues:
    types: [labeled]

jobs:
  assign:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'copilot'
    permissions:
      issues: write
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --add-assignee app/copilot
